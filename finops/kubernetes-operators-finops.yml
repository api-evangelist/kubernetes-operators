specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Kubernetes Operators
providerId: kubernetes-operators
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Kubernetes
  - Operators
  - Open Source
description: 'FOCUS-aligned FinOps for the Kubernetes Operators pattern: there is no software license
  fee, so all FinOps signal flows from the underlying compute (cluster nodes) and from any commercial
  operators consumed from third-party vendors. Cost is allocated through the workload (operator pods,
  CRD-managed resources) rather than a Kubernetes-Operators line item.'
sources:
  - https://kubernetes.io/docs/concepts/extend-kubernetes/operator/
  - https://operatorhub.io/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Cloud Native Computing Foundation (CNCF)
serviceCategory: Open Source / Kubernetes Pattern
billingModel:
  pricingCategory: Open Source (no license fee)
  billingFrequency: N/A
  billingCurrency: USD
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: Kubernetes Operators
  ServiceCategory: Container Orchestration / Pattern
  ProviderName: Kubernetes Operators (CNCF pattern)
  PublisherName: Cloud Native Computing Foundation
  BillingCurrency: USD
meters:
  - name: operator_pod_compute
    unit: vCPU-hour
    aggregation: sum
    dimensions:
      - cluster
      - namespace
      - operator_name
  - name: operator_pod_memory
    unit: GiB-hour
    aggregation: sum
    dimensions:
      - cluster
      - namespace
      - operator_name
  - name: managed_resource_count
    unit: resource
    aggregation: max
    dimensions:
      - crd
      - cluster
  - name: api_server_calls
    unit: request
    aggregation: sum
    dimensions:
      - operator_name
      - verb
principles:
  - name: Visibility
    description: Use Kubecost / OpenCost to attribute compute cost to operator workloads by namespace
      and label; surface CRD-managed resources as first-class allocation dimensions.
  - name: Allocation
    description: Label every operator deployment and the resources it manages with team, product, and
      environment so allocation flows through to the underlying cloud bill.
  - name: Optimization
    description: Right-size operator pods (most are leader-elected and idle); deduplicate operators across
      namespaces; prefer cluster-scoped operators when fan-out is wide; tune controller-runtime workqueue
      and resync periods to reduce API server pressure.
  - name: Accountability
    description: Platform team owns the cluster-shared operators (cert-manager, ingress controllers);
      product teams own application-scoped operators they install. Cost reports should split these owners.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
