specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Kubernetes Operators
providerId: kubernetes-operators
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Kubernetes
  - Operators
  - Open Source
description: Operators interact with the Kubernetes API server as authenticated clients. There is no
  vendor-imposed rate limit on the pattern itself; instead, rate limiting is enforced by the Kubernetes
  API server (per-user/per-priority-level) via API Priority and Fairness (APF) and by client-side QPS/burst
  settings configured in client-go (rest.Config).
sources:
  - https://kubernetes.io/docs/concepts/cluster-administration/flow-control/
  - https://kubernetes.io/docs/reference/config-api/apiserver-flowcontrol.v1/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: API Priority and Fairness (server-side)
    scope: priority-level
    metric: concurrent_requests
    limit: 'cluster-configured PriorityLevelConfiguration concurrency shares'
  - name: Client-side QPS / Burst (client-go)
    scope: client
    metric: requests_per_second
    limit: 'rest.Config.QPS (default 5) / Burst (default 10) — operators typically tune higher'
policies:
  - name: APF flow control
    description: The Kubernetes API server applies API Priority and Fairness; operators should set a
      sensible UserAgent and FlowSchema to avoid starvation under load.
  - name: Client-side throttling
    description: client-go enforces local QPS/Burst before sending requests; operator authors raise these
      defaults to suit reconciliation workloads.
  - name: Backoff and resync
    description: Use the controller-runtime / informer cache and rate-limited workqueues; do not poll
      the API server in tight loops — rely on watches.
  - name: Honor 429 and Retry-After
    description: When the API server returns 429 (typically with a Retry-After), back off and respect
      the suggested delay rather than retrying immediately.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
