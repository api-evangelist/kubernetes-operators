description: Kubernetes Operators are an open-source design pattern for extending the Kubernetes API
  via Custom Resources and controllers. There is no commercial entity that licenses the pattern itself
  and no pricing — the building blocks (Operator SDK, Kubebuilder, Kopf, Java Operator SDK, kube-rs,
  shell-operator, Metacontroller, OperatorHub.io) are open source under permissive licenses. Costs only
  accrue from the underlying Kubernetes cluster compute and from any third-party operators distributed
  with their own commercial terms.
sources:
  - https://kubernetes.io/docs/concepts/extend-kubernetes/operator/
  - https://operatorhub.io/
plans:
  - id: kubernetes-operators-open-source
    name: Open Source
    type: freemium
    description: The Operator pattern, the Operator Framework, OperatorHub.io, and the major SDKs are
      free and open source. Apache-2.0 / similar licenses; no vendor charge.
    entries:
      - label: Pattern + tooling
        name: oss
        type: quota
        metric: usage
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Operator pattern (open source)
      - name: Operator Framework / Operator SDK
      - name: Kubebuilder
      - name: Kopf (Python)
      - name: Java Operator SDK
      - name: kube-rs (Rust)
      - name: shell-operator
      - name: Metacontroller
      - name: OperatorHub.io registry
